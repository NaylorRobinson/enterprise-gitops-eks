<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enterprise App - Version 1.0</title>
  <style>
    /* Version 1.0 — Solid Blue baseline */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: blue;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
      color: white;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .version-badge {
      background: rgba(255,255,255,0.2);
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 1rem;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Version 1.0 - Blue</h1>
    <div class="version-badge">Awaiting Pipeline Trigger</div>
  </div>
</body>
</html>

# ============================================================
# prometheus-values.yaml — Prometheus Helm Chart Config
# ============================================================
# WHAT THIS FILE DOES:
# Configures Prometheus when you install it via Helm.
# Prometheus scrapes (collects) metrics from every pod in EKS
# and stores them so Grafana can display them as dashboards.
# ============================================================

# Install command:
# helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
# helm install prometheus prometheus-community/kube-prometheus-stack \
#   -f observability/prometheus/prometheus-values.yaml \
#   --namespace monitoring --create-namespace

prometheus:
  prometheusSpec:
    # How long to keep metrics data (15 days)
    retention: 15d

    # Storage for metrics — uses a persistent volume so data survives pod restarts
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    # Scrape every pod in the cluster that has prometheus annotations
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

  # Slack alert configuration
  # Replace YOUR_SLACK_WEBHOOK_URL with your actual webhook
  config:
    global:
      slack_api_url: 'YOUR_SLACK_WEBHOOK_URL'

    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'slack-notifications'

    receivers:
      - name: 'slack-notifications'
        slack_configs:
          - channel: '#devops-alerts'
            title: '{{ .GroupLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
                *Alert:* {{ .Labels.alertname }}
                *Severity:* {{ .Labels.severity }}
                *Description:* {{ .Annotations.description }}
              {{ end }}

grafana:
  # Default admin password — change this
  adminPassword: "UVACavaliers2026!"

  # Persist Grafana dashboards so they survive pod restarts
  persistence:
    enabled: true
    size: 5Gi

  # Pre-load dashboards automatically
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
